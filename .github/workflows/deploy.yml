name: Deploy Dishaster Cat

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on server via git pull
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            TARGET_DIR="/var/www/html/dishaster-cat"

            if [ ! -d "$TARGET_DIR/.git" ]; then
              git clone https://github.com/dmf33/dishaster-cat.git "$TARGET_DIR"
                else
              cd "$TARGET_DIR"
              git fetch origin main
              git reset --hard origin/main
            fi

            chmod -R 755 "$TARGET_DIR"
